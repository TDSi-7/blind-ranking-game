<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jones Games</title>
    <link rel="icon" type="image/png" href="blind-ranking/assets/branding/Gemini_Generated_Image_szjltrszjltrszjl.png">
    <link rel="apple-touch-icon" href="blind-ranking/assets/branding/Gemini_Generated_Image_szjltrszjltrszjl.png">
    <link rel="stylesheet" href="style.css?v=20260407b">
</head>
<body>
    <div class="home-container">
        <header class="home-header">
            <div class="header-spacer" aria-hidden="true"></div>
            <div class="header-logo-wrap">
                <img src="blind-ranking/assets/branding/Gemini_Generated_Image_szjltrszjltrszjl.png" alt="Jones Games" class="site-logo">
            </div>
            <div id="authSection" class="header-auth" style="display: none;">
                <button type="button" id="authActionBtn" class="btn-login-top" style="display: none;">Login</button>
                <button type="button" id="nicknameBtn" class="btn-nickname" style="display: none;">Nickname</button>
                <span id="authUserHint" class="auth-user-hint" style="display: none;"></span>
            </div>
        </header>

        <p id="authNote" class="auth-note" style="display: none;">Create an account and log in to keep a record of your progress and appear on the daily leaderboard.</p>
        
        <div id="loadingMessage" class="loading-message">
            <p>Loading games...</p>
        </div>
        
        <nav class="mini-menu">
            <a href="hall-of-fame/index.html" class="mini-menu-link">🏆 Hall of Fame</a>
            <a href="my-stats/index.html" class="mini-menu-link">📊 Personal Records</a>
        </nav>
        
        <div id="gamesContainer" class="games-container">
            <!-- Game cards will be dynamically inserted here -->
        </div>
        
        <div id="errorMessage" class="error-message" style="display: none;">
            <p>Oops! Couldn't load games. Please refresh the page.</p>
        </div>
    </div>

    <div id="nicknameModal" class="settings-modal" role="dialog" aria-labelledby="nicknameModalTitle" aria-modal="true" style="display:none;">
        <div class="settings-modal-backdrop"></div>
        <div class="settings-modal-content">
            <h2 id="nicknameModalTitle" class="settings-modal-title">Choose your nickname</h2>
            <div class="settings-form">
                <label for="nicknameInput">This name appears on leaderboards</label>
                <input type="text" id="nicknameInput" class="settings-nickname-input" placeholder="Nickname" maxlength="32" autocomplete="off">
                <div class="settings-modal-actions">
                    <button type="button" id="nicknameSaveBtn" class="btn-settings-save">Save nickname</button>
                    <button type="button" id="nicknameCloseBtn" class="btn-settings-close">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/profiles.js"></script>
    <!-- Optional: add Supabase URL + anon key in js/config.js (see js/config.example.js) -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="home.js?v=20260407b"></script>
</body>
</html>
