<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame - Jones Games</title>
    <link rel="icon" type="image/png" href="../blind-ranking/assets/branding/Gemini_Generated_Image_szjltrszjltrszjl.png">
    <link rel="stylesheet" href="../style.css?v=20260406hof">
</head>
<body>
    <div class="home-container stats-page">
        <div class="stats-page-logo-wrap">
            <img src="../blind-ranking/assets/branding/Gemini_Generated_Image_szjltrszjltrszjl.png" alt="Jones Games" class="stats-page-logo">
        </div>
        <div class="stats-page-header">
            <a href="../index.html" class="mini-menu-link">Back to Home</a>
            <h1 class="stats-page-title">Hall of Fame</h1>
        </div>
        <p id="hofLoginNote" class="auth-note" style="display:none;">Please log in to view Hall of Fame.</p>
        <div class="hall-of-fame-wrap">
            <div id="hofTabs" class="hof-tabs" role="tablist" aria-label="Daily challenge game">
                <button type="button" class="hof-tab" role="tab" id="hofTab-blind_ranking" aria-selected="true" data-challenge-id="blind_ranking">Blind Rank Daily</button>
                <button type="button" class="hof-tab" role="tab" id="hofTab-higher_or_lower" aria-selected="false" data-challenge-id="higher_or_lower">Higher or Lower</button>
                <button type="button" class="hof-tab" role="tab" id="hofTab-codebreaker" aria-selected="false" data-challenge-id="codebreaker">Codebreaker</button>
            </div>
            <table class="hall-of-fame-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Points</th>
                        <th>1st</th>
                        <th>2nd</th>
                        <th>3rd</th>
                        <th>Avg Pos</th>
                    </tr>
                </thead>
                <tbody id="hallOfFameBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sync.js"></script>
    <script src="script.js?v=20260406hof"></script>
</body>
</html>
